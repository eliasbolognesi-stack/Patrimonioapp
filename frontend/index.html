<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - API Patrimônio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-centered">
        <div class="auth-container">
            <div class="auth-box">
                <div class="auth-header">
                    <h1>🏛️ Patrimônio</h1>
                    <p>Acesse sua conta</p>
                </div>

                <!-- Alert Messages -->
                <div id="alertContainer"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="seu@email.com"
                            required
                        >
                        <div class="form-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••"
                            required
                        >
                        <div class="form-error"></div>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="remember"> Manter-me conectado
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <span id="btnText">Entrar</span>
                        <span id="btnLoader" class="loading" style="display: none;"></span>
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Não tem conta? <a href="registro.html">Criar conta</a></p>
                    <p style="margin-top: 10px;"><a href="#" style="font-size: 12px; color: var(--text-secondary);">Esqueceu a senha?</a></p>
                </div>
            </div>

            <!-- Demo Credentials -->
            <div style="margin-top: 30px; padding: 15px; background: rgba(139, 0, 0, 0.1); border: 1px solid rgba(139, 0, 0, 0.3); border-radius: 8px; text-align: center;">
                <p style="color: var(--text-secondary); font-size: 12px; margin-bottom: 10px;">👤 Demo - Credenciais de Teste:</p>
                <p style="color: var(--text-secondary); font-size: 12px;">Email: <strong>admin@patrimonio.com</strong></p>
                <p style="color: var(--text-secondary); font-size: 12px;">Senha: <strong>admin123</strong></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Simulação de login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');

            // Validação básica
            if (!email || !password) {
                showAlert('Por favor, preencha todos os campos', 'error');
                return;
            }

            if (!email.includes('@')) {
                showAlert('Email inválido', 'error');
                document.getElementById('email').classList.add('input-error');
                return;
            }

            // Simulação de requisição
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';

            // Credenciais de demo
            const validEmail = 'admin@patrimonio.com';
            const validPassword = 'admin123';

            setTimeout(() => {
                if (email === validEmail && password === validPassword) {
                    showAlert('Login realizado com sucesso! Redirecionando...', 'success');
                    
                    // Salvar dados da sessão
                    sessionStorage.setItem('user', JSON.stringify({
                        email: email,
                        name: 'Administrador',
                        role: 'Admin'
                    }));

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showAlert('Email ou senha inválidos', 'error');
                    btnText.style.display = 'inline';
                    btnLoader.style.display = 'none';
                }
            }, 1500);
        });

        // Limpar erro ao começar a digitar
        document.getElementById('email').addEventListener('input', function() {
            this.classList.remove('input-error');
        });
        document.getElementById('password').addEventListener('input', function() {
            this.classList.remove('input-error');
        });

        // Função para mostrar alertas
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `
                ${message}
                <span class="alert-close" onclick="this.parentElement.style.display='none';">&times;</span>
            `;
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);

            if (type === 'success') {
                setTimeout(() => {
                    alertDiv.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>
